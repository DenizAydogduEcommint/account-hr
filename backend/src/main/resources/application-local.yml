# Local development profile — expects a PostgreSQL running on localhost:5432.
# Start it with `docker compose up -d db` (or a local Postgres install).
spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/accounthr
    username: accounthr
    password: accounthr
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

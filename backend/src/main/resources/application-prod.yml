# Production profile — every datasource value comes from the environment.
# Schema is validated only; migrations own the schema.
spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL}
    username: ${SPRING_DATASOURCE_USERNAME}
    password: ${SPRING_DATASOURCE_PASSWORD}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
  flyway:
    enabled: true

# Structured (JSON) loglama — Spring Boot 3.x native (ek bağımlılık yok). ECS formatı,
# stdout'a JSON; merkezi toplama (ELK/Loki, faz 2) için uygundur. Correlation id MDC'den
# (correlationId) gelir. Seviye env ile override edilebilir.
logging:
  structured:
    format:
      console: ecs
  level:
    root: ${LOG_LEVEL_ROOT:WARN}
    com.ecommint.accounthr: ${LOG_LEVEL_APP:INFO}

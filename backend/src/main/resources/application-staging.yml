# Staging profile — every datasource value comes from the environment.
# Schema is validated only (never auto-modified); migrations (Flyway/Liquibase)
# own the schema from E1-xx onward.
spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL}
    username: ${SPRING_DATASOURCE_USERNAME}
    password: ${SPRING_DATASOURCE_PASSWORD}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
  flyway:
    enabled: true

# Swagger UI / OpenAPI api-docs staging'de KAPALI (E1 review #4) — saldırı yüzeyini
# (uç keşfi/şema sızıntısı) küçültür. dev/local açık kalır.
springdoc:
  swagger-ui:
    enabled: false
  api-docs:
    enabled: false

# Structured (JSON) loglama — Spring Boot 3.x native (ek bağımlılık yok). ECS formatı,
# stdout'a JSON; merkezi toplama (ELK/Loki, faz 2) için uygundur. Correlation id MDC'den
# (correlationId) gelir. Seviye env ile override edilebilir.
logging:
  structured:
    format:
      console: ecs
  level:
    root: ${LOG_LEVEL_ROOT:INFO}
    com.ecommint.accounthr: ${LOG_LEVEL_APP:INFO}

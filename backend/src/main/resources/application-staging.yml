# Staging profile — every datasource value comes from the environment.
# Schema is validated only (never auto-modified); migrations (Flyway/Liquibase)
# own the schema from E1-xx onward.
spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL}
    username: ${SPRING_DATASOURCE_USERNAME}
    password: ${SPRING_DATASOURCE_PASSWORD}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
  flyway:
    enabled: true

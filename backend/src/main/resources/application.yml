spring:
  application:
    name: account-hr
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:local}
  data:
    web:
      pageable:
        # Sayfa boyutu üst sınırı (allocation-DoS koruması): kimliği doğrulanmış bir
        # kullanıcı ?size=2000+ ile aşırı satır talep edemez. İstenen size > 100 ise
        # Spring 100'e kırpar (E1 review #3).
        max-page-size: 100
  servlet:
    multipart:
      # Fatura dosyaları için yükleme limitleri (E1-04). Tek dosya ve toplam istek
      # gövdesi 25MB ile sınırlı.
      max-file-size: 25MB
      max-request-size: 25MB

server:
  port: 8080

# Uygulama özel ayarları (app.*).
app:
  # JWT ayarları (E1-03 / E1-05). Süreler env override'lı; SECRET için REPODA
  # VARSAYILAN YOK — app.crypto.master-key deseni gibi boş bırakılır. local/test
  # profilleri kendi "yalnızca-dev" secret'ını verir; staging/prod'da APP_JWT_SECRET
  # env'den gelmeli (HS256 için en az 32 byte). Eksik/kısa ise boot fail (JwtService).
  jwt:
    secret: ${APP_JWT_SECRET:}
    # Access token ömrü: 15 dakika (saniye).
    access-ttl: ${APP_JWT_ACCESS_TTL:900}
    # Refresh token ömrü: 7 gün (saniye).
    refresh-ttl: ${APP_JWT_REFRESH_TTL:604800}
  # Fatura dosya depolama (E1-04). Kök dizin STORAGE_ROOT env'inden gelir; varsayılan
  # kullanıcı ev dizini altında REPO DIŞIDIR ve repoya commit EDİLMEZ. Uygulama
  # başlangıçta kök + waiting/ + trash/ alt dizinlerini oluşturur (kök boş başlar).
  # NOT: expenses/faturalar (Drive aynası) ASLA bu servisle yönetilmez.
  storage:
    root: ${STORAGE_ROOT:${user.home}/account-hr-data/faturalar}
  # Veri aktarımı (E2-03). faturalar/ klasör taramasının kaynak dizini (Drive aynası,
  # READ-ONLY). INVOICE_FILES_SOURCE_DIR env'inden gelir; staging/prod'da env ile verilir.
  # Geliştirici varsayılanı yalnızca lokal içindir (sabit bir geliştirici yolu repoda gömülü
  # DEĞİLDİR; bu bir env override'ıdır).
  import:
    invoice-files-source-dir: ${INVOICE_FILES_SOURCE_DIR:${user.home}/Dev/expenses/faturalar}
  # Google Drive waiting/ senkron köprüsü (E2-06). rclone subprocess ile çalışır.
  # GÜVENLİ KAPALI: enabled varsayılan false — env (APP_DRIVE_ENABLED=true) ile açılır.
  # Yalnızca İKİ Drive işlemi: waiting/ pull (remote→local) ve waiting/'den dosya silme.
  # Lokal dosya Drive'a ASLA push edilmez (koda gömülü kural). Drive OAuth token'ı
  # rclone'un kendi rclone.conf'unda tutulur; backend token'ları ELLEMEZ — sahip
  # olduğumuz tek ayar remote adı/yollar/binary'dir. Hiçbir değer koda gömülü DEĞİL.
  drive:
    enabled: ${APP_DRIVE_ENABLED:false}
    remote-name: ${APP_DRIVE_REMOTE_NAME:gdrive-ecommint}
    root-folder-id: ${APP_DRIVE_ROOT_FOLDER_ID:}
    waiting-remote-path: ${APP_DRIVE_WAITING_REMOTE_PATH:faturalar/waiting}
    # Boş bırakılırsa storage kökü altındaki waiting/ kullanılır (E1-04 ile aynı dizin).
    local-waiting-dir: ${APP_DRIVE_LOCAL_WAITING_DIR:}
    rclone-binary: ${APP_DRIVE_RCLONE_BINARY:rclone}
    timeout-seconds: ${APP_DRIVE_TIMEOUT_SECONDS:120}
    # Zamanlanmış otomatik pull — bu görevde @Scheduled job YOK; ileride eklenirse
    # bu bayrak (varsayılan false) ile @ConditionalOnProperty altında korunacak.
    scheduled-enabled: ${APP_DRIVE_SCHEDULED_ENABLED:false}
  # Credential şifreleme (E1-05). master-key, servis panel parolaları/API key'leri
  # AES-256-GCM ile şifrelemek için kullanılır. CREDENTIAL_MASTER_KEY env'inden gelir;
  # base64 kodlu 256-bit (32 byte) olmalı. REPODA VARSAYILAN YOK — local/test profilleri
  # kendi "yalnızca-dev" anahtarını verir. Staging/prod'da env zorunlu; eksikse boot fail.
  crypto:
    master-key: ${CREDENTIAL_MASTER_KEY:}
  # CORS izinli origin'leri (E1 review #6). Koda gömülü DEĞİL; local varsayılanı Angular
  # dev sunucusudur. staging/prod APP_CORS_ALLOWED_ORIGINS env'inden (virgülle ayrık) okur.
  # allowCredentials(true) ile joker (*) kullanılamaz → somut origin listesi.
  cors:
    allowed-origins: ${APP_CORS_ALLOWED_ORIGINS:http://localhost:4200}

# Loglama (E1-05). Varsayılan (local) profilde insan-okur desen; her satıra correlation
# id (X-Request-Id) eklenir. staging/prod profilleri structured (JSON) loglamaya geçer.
logging:
  pattern:
    correlation: "[%X{correlationId:-}] "
    level: "%5p ${logging.pattern.correlation}"

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true

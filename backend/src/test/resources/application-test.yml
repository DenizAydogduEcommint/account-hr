# Test profile — in-memory H2 so the FULL Spring context (incl. security + JPA)
# boots without PostgreSQL or Docker. H2 is test-scoped only.
spring:
  datasource:
    url: jdbc:h2:mem:accounthr;DB_CLOSE_DELAY=-1;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE
    username: sa
    password: ""
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      # Testlerde Hibernate şemayı entity'lerden üretir; Flyway (Postgres SQL) çalışmaz.
      ddl-auto: create-drop
    database-platform: org.hibernate.dialect.H2Dialect
    show-sql: false
  flyway:
    enabled: false

# Testler için sabit JWT secret + kısa-makul TTL'ler. Üretimle alakasızdır.
app:
  jwt:
    secret: test-only-fixed-jwt-secret-min-32-bytes-long-abcdefghijklmnop
    access-ttl: 900
    refresh-ttl: 604800
  # E1-05 testler için sabit credential master key (base64, 256-bit). Üretimle alakasız.
  # "test-fixed-master-key-32byte!!!!" düz metninin base64'ü.
  crypto:
    master-key: dGVzdC1maXhlZC1tYXN0ZXIta2V5LTMyYnl0ZSEhISE=
  # Storage kökü için güvenli test varsayılanı: build çıktısı altında izole bir
  # dizin (asla gerçek STORAGE_ROOT veya expenses/faturalar değil). Storage
  # testleri bunu @DynamicPropertySource ile JUnit @TempDir'e yönlendirir.
  storage:
    root: ${java.io.tmpdir}/account-hr-test-storage

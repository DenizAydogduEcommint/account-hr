# account-hr — full local stack. `docker compose up -d` brings up db + api.
# (Frontend is run separately in dev via `npm start`; an optional service is
#  available under the `frontend` profile.)

services:
  db:
    image: postgres:16
    container_name: accounthr-db
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-accounthr}
      POSTGRES_USER: ${POSTGRES_USER:-accounthr}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-accounthr}
    ports:
      - "5432:5432"
    volumes:
      - db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-accounthr} -d ${POSTGRES_DB:-accounthr}"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build: ./backend
    container_name: accounthr-api
    depends_on:
      db:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: docker
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/${POSTGRES_DB:-accounthr}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-accounthr}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-accounthr}
    ports:
      - "8080:8080"

  # Convenience DB UI at http://localhost:8081
  adminer:
    image: adminer:latest
    container_name: accounthr-adminer
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8081:8080"

  # Optional dev frontend — enable with: docker compose --profile frontend up
  # frontend:
  #   image: node:18
  #   working_dir: /app
  #   command: sh -c "npm install && npm start -- --host 0.0.0.0"
  #   volumes:
  #     - ./frontend:/app
  #   ports:
  #     - "4200:4200"
  #   profiles: ["frontend"]

volumes:
  db-data:
